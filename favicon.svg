<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#040c14"/>
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="rgba(255,240,0,0.4)" stroke-width="1"/>
  <text x="32" y="50" font-family="sans-serif" font-size="46" font-weight="700"
        text-anchor="middle" fill="#ff0" opacity="0.85"
        filter="url(#g)">Z</text>
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
